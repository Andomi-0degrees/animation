<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Image Slider - Lun Dev Style</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0d0d0d;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .banner {
            width: 100%;
            height: 100vh;
            text-align: center;
            position: relative;
        }

        /* 3D Space Frame Container Setup */
        .banner .slider {
            position: absolute;
            width: 200px;
            height: 250px;
            top: 15%;
            left: calc(50% - 100px);
            transform-style: preserve-3d;
            transform: perspective(1000px);
            animation: autoRun 25s linear infinite;
            z-index: 2;
            /* Keeps it overlapping correctly over background elements */
        }

        /* Continuous Horizontal Rotation Animation */
        @keyframes autoRun {
            from {
                transform: perspective(1000px) rotateX(-12deg) rotateY(0deg);
            }

            to {
                transform: perspective(1000px) rotateX(-12deg) rotateY(360deg);
            }
        }

        .banner .slider .item {
            position: absolute;
            inset: 0 0 0 0;
            /* Formula: (Position - 1) * (360 / Total Items) * 1deg */
            /* translateZ pushes panels outwards from the center to create the circle radius */
            transform:
                rotateY(calc((var(--position) - 1) * (360 / var(--quantity)) * 1deg)) translateZ(350px);
            /* Adjusted radius for beautiful visibility on screen */
        }

        .banner .slider .item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        /* Main typography layout at the bottom */
        .content {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 1200px;
            height: max-content;
            padding: 0 20px 80px 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 1;
        }

        .content h1 {
            font-size: 10vw;
            /* Scales with screen width */
            font-weight: 700;
            line-height: 0.8em;
            color: #1a1a1a;
            position: relative;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        /* Transparent Outline Overlay Text Effect */
        .content h1::after {
            position: absolute;
            inset: 0;
            content: attr(data-content);
            top: 0;
            left: 0;
            -webkit-text-stroke: 2px #fff;
            color: transparent;
            z-index: 3;
        }

        .content .author {
            text-align: right;
            max-width: 300px;
            padding-bottom: 10px;
        }

        .content .author h2 {
            font-size: 2.5em;
            text-transform: uppercase;
            color: #00ffd2;
        }

        .content .author p {
            font-size: 0.9em;
            color: #aaa;
            margin-top: 5px;
        }

        /* Center Foreground Object Layer using an absolute image URL */
        .banner .model {
            background-image: url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&w=600&q=80');
            width: 100%;
            height: 65vh;
            position: absolute;
            bottom: 0;
            left: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: bottom center;
            z-index: 2;
            /* Sits perfectly behind the text stroke but in front of back panels */
            pointer-events: none;
            mix-blend-mode: luminosity;
            /* Gives it an artistic portfolio feel */
            opacity: 0.85;
        }
    </style>
</head>

<body>

    <div class="banner">
        <div class="slider" style="--quantity: 8">
            <div class="item" style="--position: 1"><img
                    src="https://images.unsplash.com/photo-1504198453319-5ce911bafcde?auto=format&fit=crop&w=300&q=80"
                    alt=""></div>
            <div class="item" style="--position: 2"><img
                    src="https://images.unsplash.com/photo-1513151233558-d860c5398176?auto=format&fit=crop&w=300&q=80"
                    alt=""></div>
            <div class="item" style="--position: 3"><img
                    src="https://images.unsplash.com/photo-1518156677180-95a2893f3e9f?auto=format&fit=crop&w=300&q=80"
                    alt=""></div>
            <div class="item" style="--position: 4"><img
                    src="https://images.unsplash.com/photo-1557683316-973673baf926?auto=format&fit=crop&w=300&q=80"
                    alt=""></div>
            <div class="item" style="--position: 5"><img
                    src="https://images.unsplash.com/photo-1506157786151-b8491531f063?auto=format&fit=crop&w=300&q=80"
                    alt=""></div>
            <div class="item" style="--position: 6"><img
                    src="https://images.unsplash.com/photo-1515462277126-270d878326e5?auto=format&fit=crop&w=300&q=80"
                    alt=""></div>
            <div class="item" style="--position: 7"><img
                    src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=300&q=80"
                    alt=""></div>
            <div class="item" style="--position: 8"><img
                    src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&w=300&q=80"
                    alt=""></div>
        </div>

        <div class="model"></div>

        <div class="content">
            <h1 data-content="3D SLIDER">3D SLIDER</h1>
            <div class="author">
                <h2>Practise </h2>
                <p><b>Lorem ipsum dolor sit amet </b></p>
                <p>lorem ipsum dolor sit amet dolor sit amet dolor sit </p>
            </div>
        </div>
    </div>

</body>

</html>
