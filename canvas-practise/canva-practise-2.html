<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scroll Controlled Morphing Canvas</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden; /* Prevents default browser scroll jumping */
      background-color: #030712;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .scene-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      perspective: 1200px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    .slider-card {
      position: relative;
      z-index: 10;
      width: 90%;
      max-width: 360px;
      padding: 28px;
      background: rgba(8, 16, 33, 0.75);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      color: #ffffff;
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
      user-select: none;
      transform: rotateY(-10deg) rotateX(5deg);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      pointer-events: none; /* Allows scroll events to pass through easily to the window */
    }

    .slide-content {
      min-height: 100px;
    }

    .slide-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    .slide-desc {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
    }

    /* Subtle indicator to hint users to scroll */
    .scroll-hint {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #64748b;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 12;
    }
  </style>
</head>
<body>

  <div class="scene-container">
    <canvas id="morph-canvas"></canvas>

    <div class="slider-card">
      <div class="slide-content">
        <h2 class="slide-title" id="title">The Heart</h2>
        <p class="slide-desc" id="desc">Representing passion, core human-centric design, and fluid emotional brand experiences.</p>
      </div>
    </div>
    
    <div class="scroll-hint">Scroll Mouse to Morph</div>
  </div>

  <script>
    // --- 1. CONFIGURATION & DATA ---
    const slides = [
      { title: "The Heart", desc: "Representing passion, core human-centric design, and fluid emotional brand experiences." },
      { title: "The Star", desc: "A symbol of premium quality, peak vector calculations, and reaching for breakthrough UI excellence." },
      { title: "The Hexagon", desc: "The balance of structure and tech. Clean layout grids built for high-performance scale." }
    ];

    const titleEl = document.getElementById('title');
    const descEl = document.getElementById('desc');

    // Scroll interpolation tracking variables
    let scrollProgress = 0; // Ranges from 0 to 2 (since we have 3 shapes total)
    let targetProgress = 0;

    window.addEventListener('wheel', (e) => {
      // e.deltaY detects wheel speed direction. Adjust 0.002 to change scroll sensitivity
      targetProgress += e.deltaY * 0.002;
      
      // Restrict progress tracking between Slide 0 and Slide 2 boundaries strictly
      targetProgress = Math.max(0, Math.min(targetProgress, slides.length - 1));
    });


    // --- 2. VECTOR GENERATOR FUNCTIONS ---
    const TOTAL_POINTS = 60; 
    const canvas = document.getElementById('morph-canvas');
    const ctx = canvas.getContext('2d');

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    function generateHeart(centerX, centerY, size) {
      const pts = [];
      for (let i = 0; i < TOTAL_POINTS; i++) {
        const t = (i / TOTAL_POINTS) * Math.PI * 2;
        const x = centerX + size * 16 * Math.pow(Math.sin(t), 3);
        const y = centerY - size * (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
        pts.push({ x, y });
      }
      return pts;
    }

    function generateStar(centerX, centerY, size) {
      const pts = [];
      const spikes = 5;
      const outerRadius = size * 14;
      const innerRadius = size * 7;
      for (let i = 0; i < TOTAL_POINTS; i++) {
        const angle = (i / TOTAL_POINTS) * Math.PI * 2;
        const segment = Math.floor((i / TOTAL_POINTS) * spikes * 2);
        const r = (segment % 2 === 0) ? outerRadius : innerRadius;
        const x = centerX + Math.cos(angle - Math.PI/2) * r;
        const y = centerY + Math.sin(angle - Math.PI/2) * r;
        pts.push({ x, y });
      }
      return pts;
    }

    function generateHexagon(centerX, centerY, size) {
      const pts = [];
      const radius = size * 13;
      for (let i = 0; i < TOTAL_POINTS; i++) {
        const angle = (i / TOTAL_POINTS) * Math.PI * 2;
        const hexAngle = Math.floor(angle / (Math.PI / 3)) * (Math.PI / 3) + (Math.PI / 6);
        const nextHexAngle = hexAngle + (Math.PI / 3);
        const progress = (angle % (Math.PI / 3)) / (Math.PI / 3);
        const x1 = centerX + Math.cos(hexAngle) * radius;
        const y1 = centerY + Math.sin(hexAngle) * radius;
        const x2 = centerX + Math.cos(nextHexAngle) * radius;
        const y2 = centerY + Math.sin(nextHexAngle) * radius;
        const x = x1 + (x2 - x1) * progress;
        const y = y1 + (y2 - y1) * progress;
        pts.push({ x, y });
      }
      return pts;
    }


    // --- 3. ANIMATION & MORPH LOOP ---
    function animate() {
      ctx.clearRect(0, 0, width, height);

      // Smoothly blend current scrollProgress towards target position
      scrollProgress += (targetProgress - scrollProgress) * 0.08;

      // Automatically update HTML text cards based on nearest scroll target threshold
      const nearestSlideIndex = Math.round(scrollProgress);
      if (titleEl.textContent !== slides[nearestSlideIndex].title) {
        titleEl.textContent = slides[nearestSlideIndex].title;
        descEl.textContent = slides[nearestSlideIndex].desc;
      }

      const cx = width / 2;
      const cy = height / 2;
      const baseScale = Math.min(width, height) * 0.024; 

      // Build static shape references to run point interpolation mixes on
      const heartPts = generateHeart(cx, cy, baseScale);
      const starPts = generateStar(cx, cy, baseScale);
      const hexPts = generateHexagon(cx, cy, baseScale);

      ctx.beginPath();

      // Render vector lines by calculating exactly where between shapes the scroll is sitting
      for (let i = 0; i < TOTAL_POINTS; i++) {
        let mixX, mixY;

        if (scrollProgress <= 1) {
          // Morph seamlessly from Heart (progress 0) to Star (progress 1)
          const factor = scrollProgress; 
          mixX = heartPts[i].x + (starPts[i].x - heartPts[i].x) * factor;
          mixY = heartPts[i].y + (starPts[i].y - heartPts[i].y) * factor;
        } else {
          // Morph seamlessly from Star (progress 1) to Hexagon (progress 2)
          const factor = scrollProgress - 1; 
          mixX = starPts[i].x + (hexPts[i].x - starPts[i].x) * factor;
          mixY = starPts[i].y + (hexPts[i].y - starPts[i].y) * factor;
        }

        if (i === 0) ctx.moveTo(mixX, mixY);
        else ctx.lineTo(mixX, mixY);
      }

      ctx.closePath();

      // Rendering properties 
      ctx.fillStyle = 'rgba(37, 99, 235, 0.15)'; 
      ctx.fill();
      ctx.strokeStyle = '#2563eb'; 
      ctx.lineWidth = 3;
      ctx.stroke();

      requestAnimationFrame(animate);
    }

    animate();
  </script>
    <link rel="stylesheet" href="../css/site-nav.css">
    <script src="../js/site-nav.js" data-depth="1" defer></script>
</body>
</html>
