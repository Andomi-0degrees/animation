<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wave Text Path</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#efeeea;
    overflow:hidden;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}

svg{
    width:100%;
    height:100vh;
}

.ribbon{
    fill:none;
    stroke:#d7e34f;
    stroke-width:110;
    stroke-linecap:round;
}

text{
    font-family:Arial, sans-serif;
    font-size:34px;
    font-weight:700;
    fill:#fff;
    letter-spacing:2px;
}

.arrow{
    position:absolute;
    font-size:60px;
    color:#184f4a;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
}
</style>
</head>

<body>

<div class="arrow">↓</div>

<svg viewBox="0 0 1600 800">

    <!-- Ribbon -->
    <path
        id="wavePath"
        class="ribbon"
        d="
        M -200 120
        C 100 120,
          150 650,
          700 650

        S 1200 150,
          1800 450
        "
    />

    <!-- Moving Text -->
    <text>
        <textPath
            id="textPath"
            href="#wavePath"
            startOffset="0%">
            ★ VOLDOG ★ B.A.R.F ★ HAPPY CUSTOMERS ★ DOG LOVERS ★ PREMIUM FOOD ★ VOLDOG ★ B.A.R.F ★ HAPPY CUSTOMERS ★ DOG LOVERS ★ PREMIUM FOOD ★
        </textPath>
    </text>

</svg>

<script>
const textPath = document.getElementById("textPath");

let offset = 0;

function animate() {
    offset += 0.05;

    if(offset > 100){
        offset = 0;
    }

    textPath.setAttribute("startOffset", offset + "%");

    requestAnimationFrame(animate);
}

animate();
</script>

    <link rel="stylesheet" href="../css/site-nav.css">
    <script src="../js/site-nav.js" data-depth="1" defer></script>
</body>
</html>
