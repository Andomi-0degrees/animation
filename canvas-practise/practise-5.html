<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Canvas with HTML Slider Section</title>
  <style>
    /* Reset and Core Setup */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #030712;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* The Scene Container handling the 3D space */
    .scene-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      perspective: 1000px; /* Gives the depth illusion */
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Canvas stays completely responsive in the background */
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* The Slider UI floating inside the 3D viewport space */
    .slider-card {
      position: relative;
      z-index: 10;
      width: 350px;
      padding: 24px;
      background: rgba(8, 16, 33, 0.85); /* Dark custom branding tint */
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      color: #ffffff;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
      user-select: none;
      
      /* Pure CSS 3D angling */
      transform: rotateY(-15deg) rotateX(10deg);
      transform-style: preserve-3d;
      transition: transform 0.3s ease;
    }

    /* Subtle tilt effect when hovering over the card */
    .slider-card:hover {
      transform: rotateY(-5deg) rotateX(5deg) translateZ(10px);
    }

    .slide-content {
      min-height: 110px;
    }

    .slide-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    .slide-desc {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
    }

    /* Navigation Layout */
    .slider-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
    }

    .nav-btn {
      background: #2563eb;
      color: #ffffff;
      border: none;
      padding: 8px 16px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .nav-btn:hover {
      background: #1d4ed8;
    }

    .slide-counter {
      font-size: 14px;
      color: #64748b;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="scene-container">
    <canvas id="bg-canvas"></canvas>

    <div class="slider-card">
      <div class="slide-content">
        <h2 class="slide-title" id="title">Vanilla WebGL</h2>
        <p class="slide-desc" id="desc">Harnessing the maximum processing capability of the native web architecture seamlessly.</p>
      </div>
      
      <div class="slider-nav">
        <button class="nav-btn" id="prev-btn">&larr;</button>
        <span class="slide-counter" id="counter">1 / 3</span>
        <button class="nav-btn" id="next-btn">&rarr;</button>
      </div>
    </div>
  </div>

  <script>
    // --- 1. SLIDER LOGIC ---
    const slides = [
      { title: "Vanilla WebGL", desc: "Harnessing the maximum processing capability of the native web architecture seamlessly." },
      { title: "Performance First", desc: "No bulky framework overhead. Just ultra-fast execution, light bundles, and pristine rendering." },
      { title: "Custom Shaders", desc: "Injecting custom vertex and fragment logic directly into raw GPU buffer configurations." }
    ];

    let currentIndex = 0;

    const titleEl = document.getElementById('title');
    const descEl = document.getElementById('desc');
    const counterEl = document.getElementById('counter');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');

    function updateSlider() {
      titleEl.textContent = slides[currentIndex].title;
      descEl.textContent = slides[currentIndex].desc;
      counterEl.textContent = `${currentIndex + 1} / ${slides.length}`;
    }

    nextBtn.addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % slides.length;
      updateSlider();
    });

    prevBtn.addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + slides.length) % slides.length;
      updateSlider();
    });


    // --- 2. CANVAS ANIMATION LOGIC (Native 2D Context setup acting like a 3D grid) ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');

    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    window.addEventListener('resize', () => {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    });

    // Create background floating particle network to give depth behind the slider
    const particles = Array.from({ length: 75 }, () => ({
      x: Math.random() * width,
      y: Math.random() * height,
      radius: Math.random() * 2 + 1,
      speedX: (Math.random() - 0.5) * 0.5,
      speedY: (Math.random() - 0.5) * 0.5,
      alpha: Math.random() * 0.5 + 0.2
    }));

    function animate() {
      ctx.clearRect(0, 0, width, height);

      // Render network nodes
      particles.forEach(p => {
        p.x += p.speedX;
        p.y += p.speedY;

        // Boundary checks
        if (p.x < 0 || p.x > width) p.speedX *= -1;
        if (p.y < 0 || p.y > height) p.speedY *= -1;

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(37, 99, 235, ${p.alpha})`; // Deep theme blue
        ctx.fill();
      });

      requestAnimationFrame(animate);
    }
    
    animate();
  </script>
    <link rel="stylesheet" href="../css/site-nav.css">
    <script src="../js/site-nav.js" data-depth="1" defer></script>
</body>
</html>
